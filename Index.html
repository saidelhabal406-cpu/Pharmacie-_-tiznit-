<style>

    text-align: center;
    padding: 15px 0;
    font-size: 1.5em;
}

    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 10px;
    font-size: 1em;
    border-radius: 5px;
    border: 1px solid #ccc;
}
.pharmacy {

    margin: 10px;

}

}
.pharmacy p, .pharmacy a {

    color: #333;
}
#garde {

<input type="text" id="search" placeholder="ابحث عن صيدلية...">

];

// ======== صيدلية الحراسة ========
const gardeSchedule = [
"Pharmacie El Fath","Pharmacie Abouzaid","Pharmacie Souk","Pharmacie Erac",
"Pharmacie Route de Guelmim","Pharmacie Al Amal","Pharmacie Assafar N Issafarne"
];

const today = new Date().getDay(); // 0=Sun, 6=Sat
const gardePharmacy = pharmacies.find(p => p.name === gardeSchedule[today % gardeSchedule.length]);

document.getElementById("garde").innerHTML = `
<h2>صيدلية الحراسة اليوم 🌙</h2>
<h3>${gardePharmacy.name}</h3>
<p>📍 ${gardePharmacy.address}</p>
<a href="tel:${gardePharmacy.phone}">📞 ${gardePharmacy.phone}</a>
`;

// ======== عرض كل الصيدليات ========
const container = document.getElementById("pharmacies");

function displayPharmacies(list){
    container.innerHTML = "";
    list.forEach(p => {
        container.innerHTML += `
        <div class="pharmacy">
            <h3>${p.name}</h3>
            <p>📍 ${p.address}</p>
            <a href="tel:${p.phone}">📞 ${p.phone}</a>
        </div>
        `;
    });
}

displayPharmacies(pharmacies);

// ======== البحث ========
document.getElementById("search").addEventListener("input", function(){
    const query = this.value.toLowerCase();
    const filtered = pharmacies.filter(p => 
        p.name.toLowerCase().includes(query) || p.address.toLowerCase().includes(query)
    );
    displayPharmacies(filtered);
});
</script>

</body>
</html>
