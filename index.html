// ------------------- صيدلية الحراسة اليوم -------------------
const todayIndex = new Date().getDay() % pharmacies.length;
const todayPharmacy = pharmacies[todayIndex];
document.getElementById('guard-pharmacy').innerHTML = `
<div class="pharmacy" style="border:2px solid yellow;">
  <h3>${todayPharmacy.name_fr} - ${todayPharmacy.name_ar}</h3>
  <p>${todayPharmacy.address_fr}</p>
  <p>${todayPharmacy.address_ar}</p>
  <a href="tel:${todayPharmacy.phone}"><button>اتصل الآن</button></a>
  <a href="https://www.google.com/maps/search/?api=1&query=${todayPharmacy.lat},${todayPharmacy.lng}" target="_blank"><button>فتح على Google Maps</button></a>
</div>
`;

// ------------------- عرض الصيدليات -------------------
const container = document.getElementById('pharmacies-container');
function displayPharmacies(list) {
  container.innerHTML = "";
  list.forEach(ph => {
    const div = document.createElement('div');
    div.className = 'pharmacy';
    div.innerHTML = `<h3>${ph.name_fr} - ${ph.name_ar}</h3>
                     <p>${ph.address_fr}</p>
                     <p>${ph.address_ar}</p>
                     <a href="tel:${ph.phone}"><button>اتصل الآن</button></a>
                     <a href="https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}" target="_blank"><button>فتح على Google Maps</button></a>`;
    container.appendChild(div);
  });
}
displayPharmacies(pharmacies);

// ------------------- البحث -------------------
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const query = searchInput.value.toLowerCase();
  const filtered = pharmacies.filter(ph => ph.name_fr.toLowerCase().includes(query) || ph.name_ar.includes(query));
  displayPharmacies(filtered);
  updateMapMarkers(filtered);
});

// ------------------- الخريطة -------------------
const map = L.map('map').setView([29.696, -9.735], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'&copy; OpenStreetMap contributors' }).addTo(map);

let markers = [];
function updateMapMarkers(list) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  list.forEach((ph, idx) => {
    const icon = (idx === todayIndex) ? L.icon({iconUrl:'https://cdn-icons-png.flaticon.com/512/616/616408.png', iconSize:[35,35]}) : null;
    const marker = L.marker([ph.lat, ph.lng], icon ? {icon:icon} : {}).addTo(map);
    marker.bindPopup(`
      <b>${ph.name_fr} - ${ph.name_ar}</b><br>
      ${ph.address_ar}<br>
      ${ph.address_fr}<br>
      <a href="tel:${ph.phone}"><button>اتصل الآن</button></a>
      <a href="https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}" target="_blank"><button>فتح على Google Maps</button></a>
    `);
    markers.push(marker);
  });
}
updateMapMarkers(pharmacies);
</script>
