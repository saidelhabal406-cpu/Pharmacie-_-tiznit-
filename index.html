<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدليات تيزنيت</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  font-family: Arial;
  background:#121212;
  color:white;
  padding:20px;
}
h1,h2 { text-align:center; }
.pharmacy {
  background:#1f1f1f;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  overflow:hidden;
}
button {
  padding:8px 12px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  background:#0a7cff;
  color:white;
  font-size:13px;
  cursor:pointer;
}
button:hover { background:#095ec0; }
input { width:100%; padding:10px; margin:10px 0 20px 0; border-radius:8px; border:none; font-size:16px; }
#map { height:450px; width:100%; margin-top:20px; border-radius:12px; }
</style>
</head>
<body>

<h1>صيدليات مدينة تيزنيت</h1>

<h2>صيدلية الحراسة الليلة اليوم 🌙</h2>
<div id="guard-pharmacy"></div>

<h2>البحث عن صيدلية 🔍</h2>
<input type="text" id="search" placeholder="اكتب اسم الصيدلية بالفرنسية أو العربية">

<h2>جميع الصيدليات</h2>
<div id="pharmacies-container"></div>

<h2>الخريطة التفاعلية 🌍</h2>
<div id="map"></div>

<!-- ملفات جافاسكربت -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="pharmacies.js"></script> <!-- ملف الصيدليات -->
<script src="main.js"></script>       <!-- ملف العمليات الرئيسية -->

</body>
</html>
