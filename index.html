<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدليات تيزنيت</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:0;
direction:rtl;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.name{
font-size:18px;
font-weight:bold;
color:#2e7d32;
}

button{
border:none;
padding:10px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

.call{
background:#43a047;
color:white;
}

.map{
background:#1e88e5;
color:white;
}

</style>

</head>

<body>

<header>
صيدليات تيزنيت
</header>

<div class="container">

<div class="card">
<div class="name">Pharmacie El Fath</div>
<div>29 Lot El Fath - تيزنيت</div>

<button class="call" onclick="call('0528863442')">
اتصال
</button>

<button class="map" onclick="map('Pharmacie El Fath Tiznit')">
الموقع
</button>
</div>


<div class="card">
<div class="name">Pharmacie Abouzaid</div>
<div>Route Aglou - تيزنيت</div>

<button class="call" onclick="call('0528601500')">
اتصال
</button>

<button class="map" onclick="map('Pharmacie Abouzaid Tiznit')">
الموقع
</button>

</div>

</div>

<script>

function call(num){
window.location.href="tel:"+num;
}

function map(place){
window.open("https://www.google.com/maps/search/"+place);
}

</script>

</body>
</html>
